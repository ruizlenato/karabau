name: Build & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: karabau-arm64-v8a
          path: app/build/outputs/apk/release/app-arm64-v8a-release.apk
          retention-days: 30
      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: karabau-armeabi-v7a
          path: app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          retention-days: 30
      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: karabau-x86_64
          path: app/build/outputs/apk/release/app-x86_64-release.apk
          retention-days: 30
      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: karabau-universal
          path: app/build/outputs/apk/release/app-universal-release.apk
          retention-days: 30

  release:
    needs: build
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'bump to version')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            VERSION=$(echo "$COMMIT_MSG" | grep -oP 'bump to version \K[0-9]+\.[0-9]+\.[0-9]+' || true)
          fi
          if [ -z "$VERSION" ]; then
            echo "Could not determine version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: karabau-*
          path: apks
          merge-multiple: true

      - name: Rename APKs with version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for apk in apks/app-*-release.apk; do
            abi=$(echo "$apk" | sed 's/.*app-\(.*\)-release\.apk/\1/')
            mv "$apk" "karabau-${VERSION}-${abi}.apk"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Karabau v${{ steps.version.outputs.version }}

            Signed release builds ready to install.

            | APK | Architecture |
            |---|---|
            | `karabau-${{ steps.version.outputs.version }}-universal.apk` | Universal (all architectures) |
            | `karabau-${{ steps.version.outputs.version }}-arm64-v8a.apk` | ARM 64-bit (most modern devices) |
            | `karabau-${{ steps.version.outputs.version }}-armeabi-v7a.apk` | ARM 32-bit (older devices) |
            | `karabau-${{ steps.version.outputs.version }}-x86_64.apk` | x86 64-bit (emulators) |
          files: |
            karabau-${{ steps.version.outputs.version }}-universal.apk
            karabau-${{ steps.version.outputs.version }}-arm64-v8a.apk
            karabau-${{ steps.version.outputs.version }}-armeabi-v7a.apk
            karabau-${{ steps.version.outputs.version }}-x86_64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
